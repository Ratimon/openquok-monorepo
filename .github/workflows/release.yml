name: "Release"

on:
  push:
    tags:
      - "sdk-v[0-9]+.[0-9]+.[0-9]+"
      - "cli-v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v3"

      - name: "Release"
        uses: "ncipollo/release-action@v1"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sdk_publish:
    name: publish sdk to npm
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@openquok"
          always-auth: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - run: pnpm install

      - name: Verify npm publish credentials
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::GitHub secret NPM_AUTH_TOKEN is missing or empty."
            exit 1
          fi
          echo "npm user: $(npm whoami)"
          npm view @openquok/node-sdk version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Publish sdk to npm
        working-directory: sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

  cli_publish:
    name: publish cli to npm
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@openquok"
          always-auth: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - run: pnpm install
      - run: pnpm run publish:cli:build

      - name: Verify npm publish credentials
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::GitHub secret NPM_AUTH_TOKEN is missing or empty."
            exit 1
          fi
          echo "npm user: $(npm whoami)"
          npm view @openquok/auto-cli version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Publish cli to npm
        working-directory: agent
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
