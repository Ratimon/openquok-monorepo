# `backend` depends on `openquok-orchestrator`; `orchestrator` depends on `backend`.
# pnpm reports a cyclic workspace dependency; installs still succeed. Breaking the cycle
# would require a third package or inverting imports without losing Vercel/backend runtime resolution.
packages:
  - 'common'
  - 'backend'
  - 'orchestrator'
  - 'web'
onlyBuiltDependencies:
  - esbuild
