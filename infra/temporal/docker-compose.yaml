# Self-hosted Temporal for local dev and private deployments.
# Run from repo root: docker compose -f infra/temporal/docker-compose.yaml up -d
# Backend on the host: TEMPORAL_ADDRESS=localhost:7233 (see infra/temporal/README.md).

name: openquok-temporal

services:
  temporal-elasticsearch:
    container_name: openquok-temporal-elasticsearch
    image: elasticsearch:7.17.27
    # Official image defaults to root for entrypoint; TAKE_FILE_OWNERSHIP triggers chown of
    # data/logs to UID 1000 before dropping privileges (required when CMD is eswrapper).
    user: "0:0"
    environment:
      - TAKE_FILE_OWNERSHIP=true
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal
    expose:
      - "9200"
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  temporal-postgresql:
    container_name: openquok-temporal-postgresql
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      # Subdir avoids initdb failure when the volume root has lost+found (e.g. Railway block volumes).
      PGDATA: /var/lib/postgresql/pgdata
    networks:
      - temporal
    expose:
      - "5432"
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    container_name: openquok-temporal-server
    image: temporalio/auto-setup:1.28.1
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal
    ports:
      # Default bind 127.0.0.1 so gRPC is not reachable from other machines on the LAN.
      # Set TEMPORAL_BIND_HOST=0.0.0.0 if you need LAN access or a platform requires it.
      - "${TEMPORAL_BIND_HOST:-127.0.0.1}:${TEMPORAL_GRPC_PORT:-7233}:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro

  temporal-admin-tools:
    container_name: openquok-temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal
    stdin_open: true
    depends_on:
      - temporal
    tty: true
    profiles:
      - tools

  temporal-ui:
    container_name: openquok-temporal-ui
    image: temporalio/ui:2.34.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${TEMPORAL_CORS_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:5173,http://localhost:5173}
    networks:
      - temporal
    depends_on:
      - temporal
    ports:
      - "${TEMPORAL_BIND_HOST:-127.0.0.1}:${TEMPORAL_UI_PORT:-8080}:8080"

volumes:
  temporal-elasticsearch-data:
  temporal-postgresql-data:

networks:
  temporal:
    driver: bridge
    name: openquok-temporal-network
