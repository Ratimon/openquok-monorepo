# COMMITTED TEMPLATE — do not put production secrets here. For Railway canvas import with real
# values in `environment`, copy to a gitignored file and drag that instead:
#
#   cp infra/docker-compose.railway.example.yaml infra/docker-compose.railway.yaml
#   # edit infra/docker-compose.railway.yaml (Supabase, JWT, Redis password, domains, …)
#
# `infra/docker-compose.railway.yaml` is listed in `.gitignore`. Drag **that** file onto the Railway
# project canvas (https://docs.railway.com/deploy/dockerfiles#docker-compose). You can still move
# secrets into Railway Variables later and trim inline env in the YAML.
#
# Same service shape as docker-compose.full-stack.example.yaml. Railway-specific constraints:
# - No `restart: unless-stopped` (importer rejects it).
# - No `env_file` (importer rejects it) — use inline `environment` lists.
# - Temporal services inlined (single file for import).
# - No `container_name:` — Railway’s compose importer rejects it. Service keys (redis, temporal, api,
#   …) are still the stable DNS names on the default network.
# - Single default network; `depends_on` without health conditions (apps should retry brokers).
# - Temporal gRPC/UI use `expose` for private networking (same stack shape as common auto-setup compose samples:
#   elasticsearch:7.17.27, postgres:16, temporalio/auto-setup:1.28.1, admin-tools, temporalio/ui:2.34.0).
# - `temporal` bind-mounts `./temporal/dynamicconfig` (relative to this file → infra/temporal/dynamicconfig).
#   If a hosted importer rejects that mount, delete the `volumes` block under `temporal` only; the image still
#   ships `config/dynamicconfig/development-sql.yaml`.
#
# Image-only services (`redis`, Temporal stack, etc.): in the Railway dashboard each must use
# Source = Docker image with the tag from this file — not GitHub. If Source is the repo, Deploy shows
# “Deploying service from redis:7.2-alpine” then “error deploying from source”. Fix under Settings → Source.
#
# Builds for api/worker: this file’s `build:` (canvas import). Root railway.json matches the same
# Dockerfile for Railway CLI `railway up` (avoids “prefix not found” in monorepos). startCommand there
# is the API default; override the worker service in the dashboard or infra/railway/worker.json.
#
# Local Docker: use infra/docker-compose.full-stack.example.yaml (env_file + restart).

name: openquok-railway

# api: full app env (placeholders below — use real values in docker-compose.railway.yaml).
# worker: Temporal-only env for the current worker; extend when activities need DB/cache/etc.

services:
  # Canvas: deploy source must be Docker image `redis:7.2-alpine`, not the monorepo (see file header).
  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - openquok-railway-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    expose:
      - "9200"
    volumes:
      - temporal-railway-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  temporal-postgresql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      # Subdir avoids initdb failure when the volume root has lost+found (e.g. Railway block volumes).
      PGDATA: /var/lib/postgresql/pgdata
    expose:
      - "5432"
    volumes:
      - temporal-railway-postgresql-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.28.1
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    expose:
      - "7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${TEMPORAL_CORS_ORIGINS:-http://127.0.0.1:3000}
    expose:
      - "8080"

  # Optional: tctl / CLI against the private Temporal endpoint (no TTY — compatible with hosted runners).
  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    command: ["tail", "-f", "/dev/null"]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SITE_NAME=Openquok
      - SENDER_EMAIL_ADDRESS=
      - FRONTEND_DOMAIN_URL=https://your-frontend.example
      - BACKEND_DOMAIN_URL=https://your-api.example
      - API_PREFIX=/api/v1
      - ALLOWED_FRONTEND_ORIGINS=
      - DISABLE_REGISTRATION=false
      - NOT_SECURED=false
      - INVITE_TOKEN_SECRET=
      - JWT_SECRET=replace-with-random-secret-in-railway-variables
      - PUBLIC_SUPABASE_URL=https://your-project.supabase.co
      - PUBLIC_SUPABASE_ANON_KEY=replace-in-railway-variables
      - SUPABASE_SERVICE_ROLE_KEY=replace-in-railway-variables
      - EMAIL_ENABLED=false
      - IS_EMAIL_SERVER_OFFLINE=false
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
      - RESEND_SECRET_KEY=
      - SENTRY_DSN=
      - SENTRY_ENABLED=true
      - CACHE_PROVIDER=redis
      - CACHE_DEFAULT_TTL=300
      - CACHE_LOG_HITS=true
      - CACHE_LOG_MISSES=true
      - CACHE_CHECK_PERIOD=60
      - CACHE_USE_CLONES=false
      - CACHE_ENABLED=true
      - CACHE_ENABLE_PATTERNS=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - "REDIS_PREFIX=app:cache:"
      - REDIS_MAX_RECONNECT_ATTEMPTS=10
      - REDIS_ENABLE_OFFLINE_QUEUE=true
      - REDIS_USE_SCAN=true
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_WINDOW_MS=3600000
      - RATE_LIMIT_MAX=30
      - AUTH_RATE_LIMIT_WINDOW_MS=900000
      - AUTH_RATE_LIMIT_MAX=50
      - OAUTH_RATE_LIMIT_WINDOW_MS=300000
      - OAUTH_RATE_LIMIT_MAX=20
      - "TEMPORAL_ADDRESS=temporal:7233"
      - TEMPORAL_NAMESPACE=default
      - THREADS_APP_ID=
      - THREADS_APP_SECRET=
    depends_on:
      - redis
      - temporal

  # Worker: only Temporal + NODE_ENV are required for the current worker (see backend/temporal/worker.ts).
  # Add Supabase/Redis/etc. here when activities need them.
  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["node", "dist/temporal/worker.js"]
    environment:
      - NODE_ENV=production
      - "TEMPORAL_ADDRESS=temporal:7233"
      - TEMPORAL_NAMESPACE=default
    depends_on:
      - temporal

volumes:
  openquok-railway-redis-data:
  temporal-railway-elasticsearch-data:
  temporal-railway-postgresql-data:
