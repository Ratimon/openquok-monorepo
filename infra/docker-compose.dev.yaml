# Local development dependencies: Temporal stack + Redis.
# Does not run the Openquok API or web app — use pnpm backend:dev / pnpm web:dev on the host.
#
# From repo root:
#   pnpm infra:dev:up
#   docker compose -f infra/docker-compose.dev.yaml down
#
# Backend (host): TEMPORAL_ADDRESS=localhost:7233
# Optional Redis cache: CACHE_PROVIDER=redis and REDIS_HOST=localhost (see backend .env.example)

name: openquok-dev

include:
  - path: temporal/docker-compose.yaml

services:
  redis:
    container_name: openquok-dev-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_DEV_PORT:-6379}:6379"
    volumes:
      - openquok-dev-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  openquok-dev-redis-data:
