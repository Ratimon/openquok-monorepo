# Reference / local Docker: API + Temporal worker + Redis + Temporal stack inlined here (keep in
# sync with infra/temporal/docker-compose.yaml). The worker runs node dist/temporal/worker.js
# (same backend image as the API, different command). For scaling or advanced lifecycle,
# see https://docs.temporal.io/production-deployment/worker-deployments
#
# Railway: copy infra/docker-compose.railway.example.yaml → infra/docker-compose.railway.yaml
# (gitignored), add secrets, drag the latter onto the canvas. This file is for local Docker.
#
# Use this full-stack file for a private VM or any host where you run docker compose yourself
# (production or staging). It is the Compose layout for API + worker + brokers in one project.
#
# Configuration matches backend/.env.* style: copy infra/api.full-stack.env.example to
# infra/api.full-stack.env, fill secrets and URLs, then start Compose. The api and worker
# services load that file via env_file (same variable names as backend/config/GlobalConfig.ts).
#
# Optional host port for the API (Compose substitution only — not read by Node):
#   export API_PORT=3000
# or pass a file: docker compose --env-file ./path/to/compose.env -f ...
#
# Security: Temporal’s gRPC frontend must not be reachable from the public internet in production.
# Prefer a private network, VPN, or Temporal Cloud; see https://docs.temporal.io/self-hosted-guide/deployment
# Temporal gRPC/UI use infra/temporal/docker-compose.yaml (localhost-bound by default via
# TEMPORAL_BIND_HOST). For internet-facing hosts, keep Temporal on a private network or Cloud.
#
# Usage (from repo root):
#   cp infra/api.full-stack.env.example infra/api.full-stack.env
#   # edit infra/api.full-stack.env
#   docker compose -f infra/docker-compose.full-stack.example.yaml up -d --build
#
# container_name: optional operator-friendly names for docker ps / logs. Inter-service DNS still uses
# the service keys (redis, temporal, api, …), not these names. Unrelated to volume permissions.

name: openquok-full-stack

include:
  - path: temporal/docker-compose.yaml

services:
  redis:
    container_name: openquok-full-stack-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - openquok-full-stack-redis-data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: openquok-full-stack-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - ./api.full-stack.env
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      app: null
      temporal: null

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: openquok-full-stack-worker
    restart: unless-stopped
    command: ["node", "dist/temporal/worker.js"]
    env_file:
      - ./api.full-stack.env
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      app: null
      temporal: null

volumes:
  openquok-full-stack-redis-data:

networks:
  app:
    driver: bridge
